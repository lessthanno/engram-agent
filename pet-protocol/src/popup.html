<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 260px; background: #0a0a14; color: #eee; font-family: monospace; padding: 16px; font-size: 11px; }

    .top-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .top-row h1 { font-size: 11px; color: #a8d8ea; letter-spacing: 1px; flex: 1; }
    .bridge-pill {
      font-size: 8px; padding: 2px 7px; border-radius: 10px;
      background: #1a1a2e; border: 1px solid #2a2a3e; color: #666;
      cursor: default; transition: all 0.3s;
    }
    .bridge-pill.ok  { border-color: #2a6a2a; color: #4caf50; background: #0e200e; }
    .bridge-pill.err { border-color: #5a1a1a; color: #e53935; background: #200a0a; }

    label { display: block; color: #444; margin: 10px 0 4px; font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; }
    input, select {
      width: 100%; background: #131320; border: 1px solid #22223a;
      color: #eee; padding: 6px 8px; font-family: monospace;
      font-size: 11px; border-radius: 5px; outline: none;
    }
    input:focus, select:focus { border-color: rgba(168,216,234,0.5); }

    .modes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 4px; }
    .mode-card {
      border: 1px solid #22223a; border-radius: 7px; padding: 8px 4px;
      cursor: pointer; text-align: center; transition: all 0.15s; background: #131320;
    }
    .mode-card:hover { border-color: #3a3a5a; }
    .mode-card.selected { border-color: #a8d8ea; background: rgba(168,216,234,0.08); }
    .mode-card .icon { font-size: 18px; margin-bottom: 3px; }
    .mode-card .name { font-size: 8px; color: #666; }
    .mode-card.selected .name { color: #a8d8ea; }

    .cfg { display: none; margin-top: 6px; }
    .cfg.show { display: block; }
    .hint { font-size: 9px; color: #444; margin-top: 4px; line-height: 1.5; }
    .hint code { color: #777; background: #131320; padding: 1px 4px; border-radius: 3px; }

    hr { border: none; border-top: 1px solid #1a1a2e; margin: 12px 0; }

    .pet-row { display: flex; gap: 5px; margin-top: 4px; }
    .pet-opt {
      flex: 1; border: 1px solid #22223a; border-radius: 5px; padding: 5px 3px;
      cursor: pointer; text-align: center; font-size: 9px; color: #555;
      background: #131320; transition: all 0.15s;
    }
    .pet-opt:hover { border-color: #3a3a5a; }
    .pet-opt.selected { border-color: #a8d8ea; color: #a8d8ea; }
    .pet-dot { width: 14px; height: 14px; border-radius: 50%; margin: 0 auto 3px; }

    button#saveBtn {
      width: 100%; margin-top: 14px;
      background: linear-gradient(135deg, #a8d8ea, #7bb8cc);
      color: #0a0a14; border: none; padding: 9px;
      font-family: monospace; font-size: 11px; font-weight: bold;
      cursor: pointer; border-radius: 5px; letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }
    button#saveBtn:hover { opacity: 0.9; }
    .status { font-size: 9px; color: #4caf50; margin-top: 6px; text-align: center; height: 14px; }
  </style>
</head>
<body>
  <div class="top-row">
    <h1>🐾 PET PROTOCOL</h1>
    <div class="bridge-pill" id="bridgePill">bridge ···</div>
  </div>

  <label>AGENT 模式</label>
  <div class="modes">
    <div class="mode-card" data-mode="claude">
      <div class="icon">🤖</div>
      <div class="name">Claude</div>
    </div>
    <div class="mode-card" data-mode="codex">
      <div class="icon">📦</div>
      <div class="name">Codex</div>
    </div>
    <div class="mode-card selected" data-mode="api">
      <div class="icon">🔑</div>
      <div class="name">API Key</div>
    </div>
  </div>

  <div class="cfg" id="cfg-claude">
    <div class="hint">需要运行 pet-bridge:<br><code>cd bridge && ./pet-bridge</code></div>
  </div>
  <div class="cfg" id="cfg-codex">
    <div class="hint">需要运行 pet-bridge:<br><code>cd bridge && ./pet-bridge</code></div>
  </div>
  <div class="cfg show" id="cfg-api">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
  </div>

  <div class="cfg" id="cfg-bridge-url" style="display:block; margin-top: 8px;">
    <label>BRIDGE URL <span style="color:#333">(claude / codex 模式)</span></label>
    <input type="text" id="bridgeUrl" placeholder="http://localhost:19099">
  </div>

  <hr>

  <label>PET NAME</label>
  <input type="text" id="petName" placeholder="Mochi" maxlength="14">

  <label>CAT TYPE</label>
  <div class="pet-row">
    <div class="pet-opt selected" data-type="white">
      <div class="pet-dot" style="background:#F0F0F0;border:1px solid #ccc"></div>白猫
    </div>
    <div class="pet-opt" data-type="black">
      <div class="pet-dot" style="background:#2a2a2a;border:1px solid #555"></div>黑猫
    </div>
    <div class="pet-opt" data-type="orange">
      <div class="pet-dot" style="background:#E8A87C;border:1px solid #c88"></div>橘猫
    </div>
  </div>

  <button id="saveBtn">SAVE</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
