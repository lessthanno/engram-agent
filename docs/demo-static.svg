<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">

  <!-- Terminal chrome -->
  <rect width="840" height="420" rx="10" fill="#0a0a0a"/>
  <rect width="840" height="40" rx="10" fill="#161616"/>
  <rect y="30" width="840" height="10" fill="#161616"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <text x="420" y="24" fill="#555" text-anchor="middle" font-size="12" font-family="'SF Mono','Cascadia Code','Fira Code',monospace">engram — daily sync</text>
  <line x1="0" y1="40" x2="840" y2="40" stroke="#1e1e1e"/>

  <!-- Prompt line -->
  <text x="28" y="78" fill="#555" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">$</text>
  <text x="44" y="78" fill="#ededed" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">@engram what patterns am I showing this week?</text>

  <!-- Engram context loaded -->
  <text x="28" y="110" fill="#00cc88" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">engram</text>
  <text x="96" y="110" fill="#555" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">analyzing 7 days of behavior across git, shell, apps, AI sessions...</text>

  <!-- Divider -->
  <line x1="28" y1="128" x2="812" y2="128" stroke="#1e1e1e" stroke-dasharray="4,4"/>

  <!-- Pattern 1 -->
  <text x="28" y="155" fill="#ededed" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13" font-weight="bold">Focus Pattern</text>
  <text x="28" y="177" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">You context-switched between</text>
  <text x="262" y="177" fill="#ededed" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">8 projects</text>
  <text x="344" y="177" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">on Tuesday (lowest output day).</text>
  <text x="28" y="197" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">On days with ≤3 switches, your commit output is</text>
  <text x="388" y="197" fill="#00cc88" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13" font-weight="bold">2.4x higher</text>
  <text x="480" y="197" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">.</text>

  <!-- Pattern 2 -->
  <text x="28" y="229" fill="#ededed" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13" font-weight="bold">Morning Ramp-up</text>
  <text x="28" y="251" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">First commit consistently arrives 45-60 min after first terminal command.</text>
  <text x="28" y="271" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">You have a warmup phase. Scheduling deep work after this window increases</text>
  <text x="28" y="291" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">throughput. Your own data — not an article about productivity.</text>

  <!-- Pattern 3 -->
  <text x="28" y="323" fill="#ededed" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13" font-weight="bold">Open Debt</text>
  <text x="28" y="345" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">2 PR reviews requested this week, 0 completed. Accumulating.</text>
  <text x="28" y="365" fill="#a0a0a0" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="13">rate_limit.go:47 has a TODO from Apr 8 — no commits since. Risk: forgotten.</text>

  <!-- Footer -->
  <line x1="28" y1="385" x2="812" y2="385" stroke="#1e1e1e"/>
  <text x="28" y="403" fill="#333" font-family="'SF Mono','Cascadia Code','Fira Code',monospace" font-size="11">engram · 100% local · zero deps · runs automatically every night at 23:45</text>

</svg>
